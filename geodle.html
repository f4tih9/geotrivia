<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ülke Tahmin</title>
    <style>
        /* Koyu Arka Plan Teması */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        h1 { color: #f8fafc; }

        /* Arama Kutusu Ortalandı */
        .controls { 
            width: 100%; 
            max-width: 450px; 
            margin: 20px 0; 
            position: relative; 
        }
        #countryInput { 
            width: 100%; 
            padding: 15px; 
            border: 2px solid #3b82f6; 
            border-radius: 12px; 
            background: #1e293b; 
            color: white; 
            font-size: 16px; 
        }
        .suggestions-box { 
            position: absolute; 
            top: 100%; 
            left: 0; 
            width: 100%; 
            background: #1e293b; 
            border: 2px solid #3b82f6; 
            border-radius: 0 0 12px 12px; 
            z-index: 10; 
        }

        /* Kart Stilleri */
        .guess-card { 
            border: 2px solid #333; 
            border-radius: 15px; 
            padding: 15px; 
            margin: 10px auto; 
            background: #fff; 
            width: 450px; 
            color: #000; 
        }
        .guess-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .box { border: 2px solid #333; border-radius: 10px; padding: 10px; text-align: center; font-weight: bold; font-size: 13px; }
        .match-c { background-color: #9cdb9c !important; } 
        .mismatch-c { background-color: #ff8a8a !important; }
        .neutral-c { background-color: #f0f0f0 !important; }
        .reset-btn { margin-top: 20px; padding: 15px 30px; background: #3b82f6; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; display: none; }
    </style>
</head>
<body>

    <h1>Ülke Tahmin</h1>
    <div class="controls">
        <input type="text" id="countryInput" placeholder="Bir ülke yazın..." autocomplete="off">
        <div id="suggestions" class="suggestions-box"></div>
    </div>
    
    <div id="gameGrid"></div>
    <button id="resetBtn" class="reset-btn" onclick="location.reload()">Yeniden Oyna</button>

    <script>
    let countryDB = [], target, guessCount = 0;
    const input = document.getElementById('countryInput');
    const suggestionsBox = document.getElementById('suggestions');

    fetch('countries.json')
        .then(res => res.json())
        .then(data => { countryDB = data; target = countryDB[Math.floor(Math.random() * countryDB.length)]; });

    input.addEventListener('input', function() {
        const val = this.value.toLocaleLowerCase('tr-TR').trim();
        suggestionsBox.innerHTML = '';
        if (!val) { suggestionsBox.style.display = 'none'; return; }
        const matches = countryDB.filter(c => c.ad.toLocaleLowerCase('tr-TR').startsWith(val) || c.ad_en.toLocaleLowerCase('tr-TR').startsWith(val));
        matches.forEach(match => {
            const div = document.createElement('div');
            div.className = 'suggestion-item';
            div.textContent = match.ad;
            div.onclick = () => { input.value = match.ad; submitGuess(); };
            suggestionsBox.appendChild(div);
        });
        suggestionsBox.style.display = matches.length ? 'block' : 'none';
    });

    function submitGuess() {
        const val = input.value.toLocaleLowerCase('tr-TR').trim();
        const guess = countryDB.find(c => c.ad.toLocaleLowerCase('tr-TR') === val || c.ad_en.toLocaleLowerCase('tr-TR') === val);
        if (!guess) return;

        guessCount++;
        const isNeighbor = guess.komsular.includes(target.ad);
        const card = document.createElement('div');
        card.className = 'guess-card';
        
        const popArr = guess.nufus < target.nufus ? "⬆️" : (guess.nufus > target.nufus ? "⬇️" : "✔️");
        const areaArr = guess.alan < target.alan ? "⬆️" : (guess.alan > target.alan ? "⬇️" : "✔️");

        card.innerHTML = `
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <div style="display:flex; align-items:center; gap:10px;">
                    <img src="https://flagcdn.com/24x18/${guess.kod.toLowerCase()}.png">
                    <span style="font-weight:bold;">${guess.ad}</span>
                </div>
                <span>#${guessCount}</span>
            </div>
            <div class="guess-grid">
                <div class="box ${guess.kita === target.kita ? 'match-c' : 'mismatch-c'}">Kıta<br>${guess.kita === target.kita ? '✔️' : '✕'} ${guess.kita}</div>
                <div class="box ${guess.kiyi === target.kiyi ? 'match-c' : 'mismatch-c'}">Kıyı<br>${guess.kiyi === target.kiyi ? '✔️' : '✕'} ${guess.kiyi}</div>
                <div class="box ${(guess.ad === target.ad || isNeighbor) ? 'match-c' : 'mismatch-c'}">Komşu<br>${(guess.ad === target.ad || isNeighbor) ? '✔️' : '✕'} ${isNeighbor ? 'EVET' : 'HAYIR'}</div>
                <div class="box neutral-c">Nüfus<br><span style="font-size:16px;">${popArr}</span> ${guess.nufus} Mn</div>
                <div class="box neutral-c">Arazi Alanı<br><span style="font-size:16px;">${areaArr}</span> ${guess.alan}k km²</div>
            </div>
        `;
        document.getElementById('gameGrid').prepend(card);

        if (guess.ad === target.ad) {
            input.disabled = true;
            input.value = "Tebrikler! Doğru bildin.";
            document.getElementById('resetBtn').style.display = "block";
        } else {
            input.value = '';
        }
        suggestionsBox.style.display = 'none';
    }
    input.onkeydown = (e) => { if(e.key === 'Enter') submitGuess(); };
    </script>
</body>
</html>
