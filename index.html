<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ülke Tahmin | Coğrafya Bilgi Yarışması</title>
    
    <!-- SEO Meta Etiketleri -->
    <meta name="description" content="Ülke Tahmin ile coğrafi bilginizi test edin! Haritalar, ülkeler ve daha fazlası. Ücretsiz coğrafya oyunları burada.">
    <meta name="keywords" content="ülke tahmin, coğrafya oyunu, harita bilgisi, ücretsiz oyunlar, bilgi yarışması">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f6f3ea; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .navbar { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .logo { font-size: 24px; font-weight: bold; cursor: pointer; }
        .profile-btn { border: 2px solid #000; padding: 8px 16px; border-radius: 20px; font-weight: bold; cursor: pointer; background: white; }
        .container { width: 100%; max-width: 1200px; padding: 40px; }
        h2 { margin-bottom: 30px; }
        .game-card { border: 3px solid #000; padding: 30px; background: #50fa7b; border-radius: 18px; font-size: 24px; font-weight: bold; cursor: pointer; display: inline-block; box-shadow: 5px 5px 0 #000; text-decoration: none; color: #000; transition: transform 0.2s; }
        .game-card:hover { transform: scale(1.02); }
        
        /* Profil Modal Stili */
        #profileModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 300px; text-align: center; color: #000; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">🌍 Ülke Tahmin</div>
        <button class="profile-btn" onclick="openProfile()">Profil</button>
    </div>

    <div class="container">
        <h2>Günlük Oyunlar</h2>
        <a href="geodle.html" class="game-card">🟩 Ülke Tahmin</a>
    </div>

    <!-- Profil Penceresi -->
    <div id="profileModal">
        <div class="modal-content">
            <h3>Profilim</h3>
            <p>İstatistiklerini görmek için giriş yap.</p>
            <button onclick="closeProfile()" style="padding: 10px 20px; cursor:pointer; border-radius:10px; border:1px solid #000;">Kapat</button>
        </div>
    </div>

    <script>
        // Profil Penceresini Yönetme
        function openProfile() {
            document.getElementById('profileModal').style.display = 'flex';
        }
        function closeProfile() {
            document.getElementById('profileModal').style.display = 'none';
        }

        // Pencere dışına tıklayınca kapatma (Opsiyonel)
        window.onclick = function(event) {
            const modal = document.getElementById('profileModal');
            if (event.target == modal) {
                closeProfile();
            }
        }
    </script>
</body>
</html>
