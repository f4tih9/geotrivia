<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ülke Tahmin | Coğrafya Bilgi Yarışması</title>
    <meta name="description" content="Ülke Tahmin ile coğrafi bilginizi test edin!">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f6f3ea; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .navbar { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .logo { font-size: 24px; font-weight: bold; cursor: pointer; }
        .profile-btn { border: 2px solid #000; padding: 8px 16px; border-radius: 20px; font-weight: bold; cursor: pointer; background: white; }
        .container { width: 100%; max-width: 1200px; padding: 40px; }
        .game-card { border: 3px solid #000; padding: 30px; background: #50fa7b; border-radius: 18px; font-size: 24px; font-weight: bold; display: inline-block; box-shadow: 5px 5px 0 #000; text-decoration: none; color: #000; }
        #profileModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 300px; text-align: center; color: #000; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">🌍 Ülke Tahmin</div>
        <button class="profile-btn" onclick="openProfile()">Profil</button>
    </div>

    <div class="container">
        <h2>Günlük Oyunlar</h2>
        <a href="geodle.html" class="game-card">🟩 Ülke Tahmin</a>
    </div>

    <div id="profileModal">
        <div class="modal-content">
            <h3>Profilim</h3>
            <button id="googleBtn" style="padding:10px 20px; background:#4285F4; color:white; border:none; border-radius:5px; cursor:pointer;">Google ile Giriş Yap</button>
            <br><br>
            <button onclick="closeProfile()">Kapat</button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDDqz82thko2eiOut-yLmb2NhOktnsdUdk",
            authDomain: "ulketahmin.firebaseapp.com",
            projectId: "ulketahmin",
            storageBucket: "ulketahmin.firebasestorage.app",
            messagingSenderId: "365356269470",
            appId: "1:365356269470:web:c1a11af53820342f8c208f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        window.openProfile = () => document.getElementById('profileModal').style.display = 'flex';
        window.closeProfile = () => document.getElementById('profileModal').style.display = 'none';

        document.getElementById('googleBtn').onclick = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                alert("Hoş geldin, " + result.user.displayName);
                closeProfile();
            } catch (error) {
                alert("Hata: " + error.message);
            }
        };
    </script>
</body>
</html>
